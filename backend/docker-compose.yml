version: "3.9"

services:
  cycle-db:
    image: postgres:16
    container_name: cycle_postgres_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cycle
    volumes:
      - cycle_postgres_data:/var/lib/postgresql/data

volumes:
  cycle_postgres_data:
